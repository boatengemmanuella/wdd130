<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Down the River</title>

    <meta name="description"
      content="Contact White Water Rafting Adventures for reservations, general inquiries, and trip information. Find our address, phone number, map, and contact form here.">
    <meta name="author" content="Godfred Osei">

    <link rel="stylesheet" href="styles/rafting.css" />
</head>

<body>

    <header class="site-header">
        <img class="logo" src="images/logo.png" alt="Down the River Logo" />
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html" class="active">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main class="Contact-page">
        <h1>Contact Down the River Rafting</h1>

        <div class="contact-grid">
            <section class="company-info">
                <h2>Our Location</h2>
                <p>233 Nawuni Road, Kumasi, Ghana</p>
                <p>+233 50 504 1123</p>
                <p>info@downtheriver.com</p>

                <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=..."
                  allowfullscreen="" loading="lazy">
                </iframe>
            </section>

            <section class="contact-form">
                <h2>Send Us a Message</h2>
                <form action="#" method="post">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" required>

                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" name="user-email" required>

                    <p>Purpose of Message</p>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="general" name="purpose" value="general"
                              required>
                            <label for="general">General Inquiry</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            <label for="reservation">Reservation Question</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="website" name="purpose" value="website">
                            <label for="website">Website Suggestion</label>
                        </div>
                    </div>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <div class="newsletter-row">
                        <input type="checkbox" id="subscribe" name="newsletter">
                        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    </div>

                    <button type="submit" class="submit-btn">Send My Message</button>
                </form>
            </section>
        </div>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <figure>
                <img src="images/brock.jpg" alt="Brock">
                <figcaption>Brock</figcaption>
            </figure>
            <figure>
                <img src="images/claire.jpg" alt="Claire">
                <figcaption>Claire</figcaption>
            </figure>
            <figure>
                <img src="images/bradley.jpg" alt="Bradley">
                <figcaption>Bradley</figcaption>
            </figure>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 🚣‍♂️ The Rapids | Emmanuella Gyamfuaa Boateng</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram icon">
            </a>
        </nav>
    </footer>

</body>

</html>
